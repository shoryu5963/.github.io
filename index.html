<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名道マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f4f4; }
        .container { display: flex; height: 100vh; flex-direction: column; }
        @media (min-width: 768px) {
            .container { flex-direction: row; }
            #sidebar { width: 350px; height: 100vh; border-right: 1px solid #ccc; }
            #map { flex-grow: 1; height: 100vh; }
        }
        #map { height: 40%; width: 100%; }
        #sidebar { height: 60%; width: 100%; overflow-y: auto; background: #fff; }

        /* カテゴリ見出し：今回のデータから「名道」などを取得 */
        .category-header {
            background: #e2e8f0;
            padding: 12px 15px;
            font-weight: bold;
            font-size: 14px;
            color: #333;
            border-bottom: 2px solid #cbd5e1;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; background: #fff; }
        .list-item:hover { background: #f0f7ff; }
        .list-item h3 { margin: 0; font-size: 15px; color: #1e293b; }
    </style>
</head>
<body>
<div class="container">
    <div id="map"></div>
    <div id="sidebar"><div id="location-list"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>
    const map = L.map('map').setView([35, 135], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const listContainer = document.getElementById('location-list');
    const allLayersGroup = L.featureGroup().addTo(map);

    // リストに項目を追加する関数
    function addToList(feature, layer) {
        const name = feature.properties.name || "名称未設定";
        const listItem = document.createElement('div');
        listItem.className = 'list-item';
        listItem.innerHTML = `<h3>${name}</h3>`;
        
        listItem.onclick = () => {
            // 線（LineString）の場合はその範囲にズーム、点（Point）の場合は中心移動
            if (layer.getBounds) {
                map.fitBounds(layer.getBounds(), { padding: [50, 50] });
            } else if (layer.getLatLng) {
                map.setView(layer.getLatLng(), 15);
            }
            layer.openPopup();
            // スマホなら地図までスクロール
            if (window.innerWidth < 768) window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        listContainer.appendChild(listItem);
        layer.bindPopup(`<strong>${name}</strong>`);
    }

    if (typeof umapData !== 'undefined' && umapData.layers) {
        listContainer.innerHTML = '';
        
        umapData.layers.forEach(ld => {
            // ★今回の重要ポイント：ld.properties.name からレイヤー名を取得
            const catName = (ld.properties && ld.properties.name) ? ld.properties.name : "レイヤー";
            
            // 見出しの作成
            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerText = catName;
            listContainer.appendChild(header);

            // 各レイヤーのデータを地図とリストに追加
            L.geoJson(ld, {
                style: { color: '#3b82f6', weight: 5, opacity: 0.7 }, // 道を見やすく青色に
                onEachFeature: addToList
            }).addTo(allLayersGroup);
        });

        // 全データが収まるように地図を調整
        if (allLayersGroup.getLayers().length > 0) {
            map.fitBounds(allLayersGroup.getBounds(), { padding: [30, 30] });
        }
    } else {
        listContainer.innerHTML = '<p style="padding:20px;color:red;">データ構造が正しくありません。.umapファイルを正しく貼り付けているか確認してください。</p>';
    }
</script>
</body>
</html>
