<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        .container { display: flex; height: 100vh; flex-direction: column; }
        @media (min-width: 768px) {
            .container { flex-direction: row; }
            #sidebar { width: 350px; height: 100vh; border-right: 1px solid #ccc; }
            #map { flex-grow: 1; height: 100vh; }
        }
        #map { height: 50%; width: 100%; }
        #sidebar { height: 50%; width: 100%; overflow-y: auto; background: #fff; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .list-item:hover { background: #f0f7ff; }
        .list-item h3 { margin: 0; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div id="map"></div>
    <div id="sidebar"><div id="location-list"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- ★ ここで外部に分けたデータを読み込む -->
<script src="data.js"></script>

<script>
    const map = L.map('map').setView([35, 135], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const listContainer = document.getElementById('location-list');

    // umapData（data.jsの中身）を使ってリストとピンを作成
    if (typeof umapData !== 'undefined') {
        const geojsonLayer = L.geoJson(umapData, {
            onEachFeature: (feature, layer) => {
                const name = feature.properties.name || "名称未設定";
                
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<h3>${name}</h3>`;
                item.onclick = () => {
                    if (layer.getBounds) {
                        map.fitBounds(layer.getBounds(), { padding: [50, 50] });
                    } else {
                        map.setView(layer.getLatLng(), 15);
                    }
                    layer.openPopup();
                    if (window.innerWidth < 768) window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                listContainer.appendChild(item);
                layer.bindPopup(name);
            }
        }).addTo(map);

        if (umapData.features.length > 0) {
            map.fitBounds(geojsonLayer.getBounds());
        }
    } else {
        listContainer.innerHTML = '<p style="padding:15px;color:red;">データを読み込めませんでした。</p>';
    }
</script>
</body>
</html>
