<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ツーリング・マップ</title>
    <style>
        body { margin: 0; padding: 0; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: #f0f2f5; color: #333; }
        
        /* ヘッダー */
        header { background: #1a202c; color: white; padding: 1rem; text-align: center; }
        
        /* メインコンテンツ：地図を中央に */
        main { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .map-container {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;
        }

        /* uMapの埋め込み。アスペクト比を維持（16:9） */
        .iframe-wrapper { position: relative; width: 100%; padding-top: 56.25%; }
        .iframe-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        /* リンク集セクション */
        .link-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .link-section h2 { margin-top: 0; font-size: 1.2rem; border-left: 4px solid #3182ce; padding-left: 10px; }
        
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .link-card {
            display: block; padding: 12px; background: #edf2f7; color: #2d3748;
            text-decoration: none; border-radius: 8px; text-align: center;
            font-weight: bold; transition: background 0.2s;
        }
        .link-card:hover { background: #e2e8f0; color: #3182ce; }
    </style>
</head>
<body>

<header>
    <h1>りんの旅地図</h1>
</header>

<main>
    <div class="map-container">
        <div class="iframe-wrapper">
            <iframe src="http://umap.openstreetmap.fr/ja/map/map_1403055?scaleControl=false&miniMap=false&scrollWheelZoom=false&zoomControl=true&allowEdit=false&moreControl=true&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=undefined&captionBar=false"></iframe>
        </div>
    </div>

    <div class="link-section">
        <h2>クイックリンク</h2>
        <div id="link-grid" class="link-grid">
            </div>
    </div>
</main>

<script>
    // ★ メンテナンス用：ここにリンクを足していくだけで自動反映されるよ
    const quickLinks = [
        { name: "日本気象協会 (天気予報)", url: "https://tenki.jp/" },
        { name: "ドラぷら (高速料金)", url: "https://www.driveplaza.com/" },
        { name: "JARTIC (道路交通情報)", url: "https://www.jartic.or.jp/" },
        { name: "Google マップ", url: "https://www.google.co.jp/maps" }
    ];

    const grid = document.getElementById('link-grid');
    quickLinks.forEach(link => {
        const a = document.createElement('a');
        a.href = link.url;
        a.className = 'link-card';
        a.target = '_blank'; // 別タブで開く
        a.innerText = link.name;
        grid.appendChild(a);
    });
</script>

</body>
</html>
