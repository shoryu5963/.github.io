<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>りんの旅地図</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f0f2f5; color: #333; }
        header { background: #1a202c; color: white; padding: 15px; text-align: center; }
        
        main { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* 地図エリア */
        .map-section {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px;
        }
        .map-wrapper iframe {
            width: 100%;
            height: 75vh;
            border: 0;
            display: block;
            background: #e5e7eb;
        }

        /* リンク集エリア */
        .link-section { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .link-section h2 { margin-top: 0; font-size: 1.3rem; border-left: 5px solid #3182ce; padding-left: 12px; margin-bottom: 20px; }
        
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
        }
        .link-card {
            display: flex; align-items: center; justify-content: center;
            padding: 15px; background: #edf2f7; color: #2d3748;
            text-decoration: none; border-radius: 8px; text-align: center;
            font-weight: bold; transition: all 0.2s; border: 1px solid #cbd5e1;
        }
        .link-card:hover { background: #3182ce; color: white; transform: translateY(-2px); }

        .map-footer { padding: 10px; background: #f8fafc; text-align: right; border-top: 1px solid #eee; }
        .map-footer a { color: #3182ce; font-size: 0.9rem; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <h1>りんの旅地図</h1>
</header>

<main>
    <div class="map-section">
        <div class="map-wrapper">
            <iframe allowfullscreen allow="geolocation" src="https://umap.openstreetmap.fr/ja/map/map_1403055?scaleControl=false&miniMap=false&scrollWheelZoom=true&zoomControl=true&editMode=disabled&moreControl=true&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=none&captionBar=false&captionMenus=true"></iframe>
        </div>
        <div class="map-footer">
            <a href="https://umap.openstreetmap.fr/ja/map/map_1403055" target="_blank">別タブでフルスクリーン表示 ↗</a>
        </div>
    </div>

    <div class="link-section">
        <h2>クイックリンク</h2>
        <div id="link-grid" class="link-grid"></div>
    </div>
</main>

<script>
    // メンテナンス用：リンクを増やす場合はここに追加
    const quickLinks = [
        { name: "天気 (tenki.jp)", url: "https://tenki.jp/" },
        { name: "ドラぷら (高速料金)", url: "https://www.driveplaza.com/" },
        { name: "JARTIC (渋滞情報)", url: "https://www.jartic.or.jp/" },
        { name: "Google マップ", url: "https://www.google.co.jp/maps" },
        { name: "周辺のガソリンスタンド", url: "https://www.google.com/maps/search/%E3%82%AC%E3%82%BD%E3%83%AA%E3%83%B3%E3%82%B9%E3%82%BF%E3%83%B3%E3%83%89/" }
    ];

    const grid = document.getElementById('link-grid');
    quickLinks.forEach(link => {
        const a = document.createElement('a');
        a.href = link.url;
        a.className = 'link-card';
        a.target = '_blank';
        a.innerText = link.name;
        grid.appendChild(a);
    });
</script>

</body>
</html>
