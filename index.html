<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カテゴリ別マイマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f4f4; }
        .container { display: flex; height: 100vh; flex-direction: column; }
        @media (min-width: 768px) {
            .container { flex-direction: row; }
            #sidebar { width: 350px; height: 100vh; border-right: 1px solid #ccc; }
            #map { flex-grow: 1; height: 100vh; }
        }
        #map { height: 40%; width: 100%; }
        #sidebar { height: 60%; width: 100%; overflow-y: auto; background: #fff; }

        /* カテゴリ見出しのスタイル */
        .category-header {
            background: #e2e8f0;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #ccc;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; background: #fff; }
        .list-item:hover { background: #f0f7ff; }
        .list-item h3 { margin: 0; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="map"></div>
    <div id="sidebar"><div id="location-list"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>
    const map = L.map('map').setView([35, 135], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const listContainer = document.getElementById('location-list');
    const allLayersGroup = L.featureGroup().addTo(map);

    // umap形式のデータを読み込んでレイヤーごとに処理
    if (typeof umapData !== 'undefined' && umapData.layers) {
        umapData.layers.forEach(layerData => {
            
            // レイヤー名（名道など）を取得
            const categoryName = (layerData._umap_options && layerData._umap_options.name) 
                                 ? layerData._umap_options.name 
                                 : "名称未設定レイヤー";

            // 見出しを追加
            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerText = categoryName;
            listContainer.appendChild(header);

            // そのレイヤー内の地点をリスト化
            const geojsonLayer = L.geoJson(layerData, {
                onEachFeature: (feature, layer) => {
                    const name = feature.properties.name || "名称未設定";
                    
                    const listItem = document.createElement('div');
                    listItem.className = 'list-item';
                    listItem.innerHTML = `<h3>${name}</h3>`;
                    
                    listItem.onclick = () => {
                        if (layer.getBounds) {
                            map.fitBounds(layer.getBounds(), { padding: [50, 50] });
                        } else {
                            map.setView(layer.getLatLng(), 15);
                        }
                        layer.openPopup();
                        if (window.innerWidth < 768) window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    listContainer.appendChild(listItem);
                    layer.bindPopup(`<strong>${name}</strong>`);
                }
            });
            
            geojsonLayer.addTo(allLayersGroup);
        });

        // 全体のズーム調整
        if (allLayersGroup.getLayers().length > 0) {
            map.fitBounds(allLayersGroup.getBounds(), { padding: [30, 30] });
        }

    } else {
        listContainer.innerHTML = '<p style="padding:15px;color:red;">データを読み込めませんでした。フルデータ（.umap）形式か確認してください。</p>';
    }
</script>
</body>
</html>
